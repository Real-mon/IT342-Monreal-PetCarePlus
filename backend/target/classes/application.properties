## Spring Boot application configuration using environment variables
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

server.port=8080

jwt.secret=${JWT_SECRET}
jwt.access-expiration=3600000
jwt.refresh-expiration=604800000

springdoc.swagger-ui.path=/swagger-ui.html
